name: Drift

on:
    schedule:
        - cron: "0 6 * * 1" # Weekly, Monday 06:00 UTC
    workflow_dispatch:

permissions:
    contents: read
    issues: write

concurrency:
    group: drift
    cancel-in-progress: false

env:
    RUST_BACKTRACE: 1
    CARGO_TERM_COLOR: always

jobs:
    drift:
        name: Catalog freshness
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
            # `drift` exits non-zero when it finds drift; the JSON it prints is the
            # signal we act on, so keep the step green and let the report decide.
            - name: Check upstream drift
              run: cargo run --release -p zkr-cli -- drift --format json > drift.json || true
            - name: Report drift
              uses: actions/github-script@v7
              with:
                  script: |
                      const path = require("path");
                      const reportDrift = require(path.resolve("scripts/report-drift.js"));
                      await reportDrift({ github, context, core });
