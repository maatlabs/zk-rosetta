name: Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

env:
    RUST_BACKTRACE: 1
    CARGO_TERM_COLOR: always

jobs:
    build:
        name: Build site
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
            - name: Validate catalog
              run: cargo run --release -p zkr-cli -- validate
            - name: Render site
              run: cargo run --release -p zkr-site -- build --data data --out dist
            - name: Build search index
              # Pinned, checksum-verified standalone binary so the search build
              # is reproducible rather than floating on the latest published tag.
              env:
                  PAGEFIND_VERSION: "1.5.2"
                  PAGEFIND_SHA256: "afb824a9e7f64905a934900481cea5be679c03975e527329e0e5e6cc70f5feda"
              run: |
                  asset="pagefind-v${PAGEFIND_VERSION}-x86_64-unknown-linux-musl.tar.gz"
                  curl -sSfL -o "$asset" "https://github.com/CloudCannon/pagefind/releases/download/v${PAGEFIND_VERSION}/${asset}"
                  echo "${PAGEFIND_SHA256}  ${asset}" | sha256sum -c -
                  tar -xzf "$asset"
                  ./pagefind --site dist
            - uses: actions/configure-pages@v5
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
