name: Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

env:
    RUST_BACKTRACE: 1
    CARGO_TERM_COLOR: always

jobs:
    build:
        name: Build site
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
            - name: Validate catalog
              run: cargo run --release -p zkr-cli -- validate
            - name: Render site
              run: cargo run --release -p zkr-site -- build --data data --out dist
            - name: Build search index
              run: npx -y pagefind@1 --site dist
            - uses: actions/configure-pages@v5
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
