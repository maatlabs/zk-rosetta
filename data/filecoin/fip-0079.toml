name = "bls-signatures"
language = "rust"
url = "https://github.com/filecoin-project/bls-signatures"
audited = true
audit_ref = "https://research.nccgroup.com/wp-content/uploads/2020/10/NCC_Group_ProtocolLabs_PRLB007_Report_2020-10-20_v1.0.pdf"

