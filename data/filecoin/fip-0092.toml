name = "rust-fil-proofs"
language = "rust"
url = "https://github.com/filecoin-project/rust-fil-proofs"
audited = true
audit_ref = "https://github.com/filecoin-project/rust-fil-proofs/blob/master/audits/Sigma-Prime-Protocol-Labs-Filecoin-Proofs-Security-Review-v2.1.pdf"

[[implementations]]
