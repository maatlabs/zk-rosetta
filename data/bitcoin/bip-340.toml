id = "BIP-340"
title = "Schnorr Signatures for secp256k1"
ecosystem = "bitcoin"
layer = "L1"
category = "primitive"
status = "final"
native_status = "Deployed"
primitive = "secp256k1"
enables = "ZK-composable signatures"
spec = "https://github.com/bitcoin/bips/blob/master/bip-0340.mediawiki"
notes = "Schnorr signatures for secp256k1; Schnorr is itself a sigma protocol (a proof of knowledge of a discrete logarithm) made non-interactive via Fiat-Shamir, and its linearity across key aggregation, adaptor signatures, and threshold schemes plus a clean security reduction make it especially tractable to compose with zero-knowledge constructions."
