notes = "Simplifies the error code for the family of BN254 syscalls (sol_alt_bn128_group_op, sol_alt_bn128_compression, and sol_poseidon), reducing the risk of consensus failure from divergent error codes across validators; these syscalls collectively enable on-chain Groth16 verification and ZK Compression."
