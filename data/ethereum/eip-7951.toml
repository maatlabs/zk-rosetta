notes = "Precompile for secp256r1 (NIST P-256) signature verification at address 0x100; it supersedes RIP-7212, fixing a point-at-infinity check and a modular-comparison bug, and lets hardware-enclave signers such as Apple Secure Enclave, Android Keystore, and WebAuthn or FIDO2 be verified on-chain cheaply."
